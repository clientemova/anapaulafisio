<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ficha de Avaliação Fisioterapêutica</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f6f9;
      padding: 30px;
      color: #222;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      background: white;
      border-radius: 14px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 30px;
      color: #0f172a;
    }

    .subtitle {
      text-align: center;
      margin-bottom: 30px;
      color: #64748b;
    }

    .section {
      margin-bottom: 30px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 20px;
    }

    .section h2 {
      margin-bottom: 20px;
      font-size: 20px;
      color: #1e293b;
      border-left: 5px solid #2563eb;
      padding-left: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
    }

    .field {
      display: flex;
      flex-direction: column;
    }

    label {
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: bold;
      color: #334155;
    }

    input,
    textarea,
    select {
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 12px;
      font-size: 14px;
      background: #fff;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
      font-weight: bold;
    }

    .print-btn {
      background: #2563eb;
      color: white;
    }

    .print-btn:hover {
      background: #1d4ed8;
    }

    .pdf-btn {
      background: #dc2626;
      color: white;
    }

    .pdf-btn:hover {
      background: #b91c1c;
    }

    .clear-btn {
      background: #e2e8f0;
      color: #111827;
    }

    .clear-btn:hover {
      background: #cbd5e1;
    }

    .signature {
      margin-top: 60px;
      display: flex;
      justify-content: space-between;
      gap: 20px;
    }

    .signature-box {
      width: 45%;
      text-align: center;
    }

    .signature-line {
      border-top: 1px solid #000;
      margin-bottom: 8px;
      height: 40px;
    }

    @media print {
      body {
        background: white;
        padding: 0;
      }

      .container {
        box-shadow: none;
        border-radius: 0;
        padding: 10px;
      }

      .buttons {
        display: none;
      }

      input,
      textarea,
      select {
        border: 1px solid #999;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Ficha de Avaliação Fisioterapêutica</h1>
    <p class="subtitle">Preencha os dados da avaliação e imprima ao finalizar.</p>

    <div class="section">
      <h2>Dados do Paciente</h2>
      <div class="grid">
        <div class="field">
          <label>Nome Completo</label>
          <input type="text" placeholder="Digite o nome do paciente" />
        </div>

        <div class="field">
          <label>Data de Nascimento</label>
          <input type="date" />
        </div>

        <div class="field">
          <label>Idade</label>
          <input type="number" placeholder="Idade" />
        </div>

        <div class="field">
          <label>Telefone</label>
          <input type="tel" placeholder="(00) 00000-0000" />
        </div>

        <div class="field">
          <label>Profissão</label>
          <input type="text" placeholder="Profissão" />
        </div>

        <div class="field">
          <label>Convênio</label>
          <input type="text" placeholder="Convênio" />
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Queixa Principal</h2>
      <div class="field">
        <label>Descrição da dor / desconforto</label>
        <textarea placeholder="Descreva a queixa principal do paciente..."></textarea>
      </div>
    </div>

    <div class="section">
      <h2>Histórico Clínico</h2>
      <div class="grid">
        <div class="field">
          <label>Patologias</label>
          <textarea placeholder="Patologias existentes"></textarea>
        </div>

        <div class="field">
          <label>Cirurgias</label>
          <textarea placeholder="Cirurgias anteriores"></textarea>
        </div>

        <div class="field">
          <label>Medicamentos</label>
          <textarea placeholder="Medicamentos em uso"></textarea>
        </div>

        <div class="field">
          <label>Alergias</label>
          <textarea placeholder="Alergias conhecidas"></textarea>
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Avaliação Física</h2>
      <div class="grid">
        <div class="field">
          <label>Postura</label>
          <textarea placeholder="Observações posturais"></textarea>
        </div>

        <div class="field">
          <label>Amplitude de Movimento</label>
          <textarea placeholder="ADM"></textarea>
        </div>

        <div class="field">
          <label>Força Muscular</label>
          <textarea placeholder="Força muscular"></textarea>
        </div>

        <div class="field">
          <label>Escala de Dor</label>
          <select>
            <option>Selecione</option>
            <option>0 - Sem dor</option>
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4</option>
            <option>5</option>
            <option>6</option>
            <option>7</option>
            <option>8</option>
            <option>9</option>
            <option>10 - Dor intensa</option>
          </select>
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Diagnóstico Fisioterapêutico</h2>
      <div class="field">
        <textarea placeholder="Digite o diagnóstico fisioterapêutico..."></textarea>
      </div>
    </div>

    <div class="section">
      <h2>Plano de Tratamento</h2>
      <div class="field">
        <textarea placeholder="Descreva o plano de tratamento e objetivos..."></textarea>
      </div>
    </div>

    <div class="section">
      <h2>Observações</h2>
      <div class="field">
        <textarea placeholder="Observações adicionais..."></textarea>
      </div>
    </div>

    <div class="signature">
      <div class="signature-box">
        <div class="signature-line"></div>
        <p>Assinatura do Paciente</p>
      </div>

      <div class="signature-box">
        <div class="signature-line"></div>
        <p>Assinatura do Fisioterapeuta</p>
      </div>
    </div>

    <div class="buttons">
      <button class="print-btn" onclick="window.print()">Imprimir Avaliação</button>
      <button class="pdf-btn" onclick="salvarPDF()">Salvar em PDF</button>
      <button class="clear-btn" onclick="limparFormulario()">Limpar Dados</button>
    </div>
  </div>

  <script>
    function salvarPDF() {
      const tituloOriginal = document.title;
      document.title = 'avaliacao-fisioterapeutica';
      window.print();
      document.title = tituloOriginal;
    }

    function limparFormulario() {
      const inputs = document.querySelectorAll('input, textarea, select');

      inputs.forEach(input => {
        if (input.tagName === 'SELECT') {
          input.selectedIndex = 0;
        } else {
          input.value = '';
        }
      });
    }
  </script>
</body>
</html>
